<head>

    <style>
        .page-content {
            padding: 40px 80px 80px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 32px;
        }

        /* SAVED GRID — reuse product card style */
        .saved-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .saved-card {
            position: relative;
            transition: transform 0.3s ease;
            animation: fadeSlideUp 0.5s ease forwards;
        }

        .saved-card:hover {
            transform: translateY(-5px) scale(1.03);
        }

        .saved-card figure {
            width: 100%;
            height: 260px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 3px;
        }

        .saved-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .saved-card h3 {
            font-size: 14px;
            margin-top: 10px;
            font-weight: 600;
        }

        .price {
            margin-top: 6px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* REMOVE HEART BUTTON */
        .unsave-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--color-white);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-card);
            transition: transform 0.2s ease;
        }

        .unsave-btn:hover {
            transform: scale(1.15);
        }

        .unsave-btn svg {
            fill: red;
            stroke: red;
        }

        /* ADD TO CART BUTTON */
        .add-cart-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: var(--color-text);
            color: var(--color-white);
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-cart-btn:hover { opacity: 0.75; }

        /* EMPTY STATE */
        .saved-empty {
            text-align: center;
            padding: 100px 20px;
            color: hsl(0, 0%, 55%);
            display: none;
        }

        .saved-empty svg {
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .saved-empty p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .saved-empty a {
            display: inline-block;
            padding: 12px 28px;
            border: 2px solid var(--color-text);
            border-radius: 30px;
            text-decoration: none;
            color: var(--color-text);
            font-size: 14px;
            transition: 0.2s;
        }

        .saved-empty a:hover {
            background: var(--color-text);
            color: var(--color-white);
        }

        @media (max-width: 1024px) {
            .saved-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .page-content {
                padding: 40px;
            }
        }

        @media (max-width: 768px) {
            .page-content {
                padding: 20px 16px 100px;
            }

            .saved-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .saved-card figure {
                height: 180px;
            }
        }
    </style>
</head>

    <script src="script.js"></script>
    <script>
        function unsave(btn) {
            const card = btn.closest(".saved-card");
            card.style.transition = "opacity 0.3s ease, transform 0.3s ease";
            card.style.opacity = "0";
            card.style.transform = "scale(0.9)";
            setTimeout(() => {
                card.remove();
                checkEmpty();
            }, 300);
        }

        function addToCart(btn) {
            btn.textContent = "✓ Нэмэгдлээ";
            btn.style.background = "hsl(0,0%,50%)";
            btn.disabled = true;
        }

        function checkEmpty() {
            const cards = document.querySelectorAll(".saved-card");
            if (cards.length === 0) {
                document.getElementById("savedGrid").style.display = "none";
                document.getElementById("savedEmpty").style.display = "block";
            }
        }
    </script>
