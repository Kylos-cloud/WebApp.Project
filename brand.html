  <script src="script.js"></script>
  <script type="module">
    import { ProductStore } from "./modules/ProductStore.js";
    import { ProductRenderer } from "./modules/ProductRenderer.js";

    async function init() {
      // URL-аас брэндийн нэр авах
      const params = new URLSearchParams(window.location.search);
      const brandName = params.get("brand") || "";

      if (!brandName) {
        window.location.href = "index.html";
        return;
      }

      const res = await fetch("products.json");
      const data = await res.json();
      const store = new ProductStore(data);

      // Брэндийн мэдээлэл олох
      const brandInfo = data.brands.find(
        b => b.name.toLowerCase() === brandName.toLowerCase()
      );

      // Hero хэсэг
      document.title = `SHOP — ${brandName}`;
      document.getElementById("brandHero").innerHTML = `
        ${brandInfo
          ? `<img class="brand-hero-logo" src="${brandInfo.image}" alt="${brandName}"
                  onerror="this.style.display='none'">`
          : ""}
        <div class="brand-hero-info">
          <h1>${brandName.toUpperCase()}</h1>
          <p>${store.allProducts.filter(p =>
            p.brand.toLowerCase() === brandName.toLowerCase()
          ).length} бараа</p>
        </div>`;

      document.getElementById("brandProductTitle").textContent =
        `${brandName} — бүх бараа`;

      // Барааг шүүж харуулах
      const filtered = store.allProducts.filter(
        p => p.brand.toLowerCase() === brandName.toLowerCase()
      );

      const renderer = new ProductRenderer({
        productsEl: document.getElementById("brandProductsGrid")
      });

      if (filtered.length === 0) {
        document.getElementById("brandProductsGrid").innerHTML =
          `<p class="empty-msg">${brandName} брэндийн бараа олдсонгүй.</p>`;
      } else {
        renderer.renderProducts(filtered);
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
